---
name: release

"on":
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/e-commerce

jobs:
  # ── 1. Release Please — version bump PRs & GitHub Releases ────────────────
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          manifest-file: ".release-please-manifest.json"
          config-file: "release-please-config.json"

      - name: Build release matrix
        id: matrix
        if: steps.release.outputs.releases_created == 'true'
        env:
          OUTPUTS: ${{ toJSON(steps.release.outputs) }}
        run: |
          PATHS='${{ steps.release.outputs.paths_released }}'

          MATRIX="[]"
          while IFS= read -r path; do
            [[ -z "${path}" ]] && continue
            app="${path##*/}"
            version=$(echo "${OUTPUTS}" | jq -r --arg k "${path}--version" '.[$k]')
            major="${version%%.*}"
            minor="${version%.*}"
            MATRIX=$(echo "${MATRIX}" | jq -c \
              --arg app "${app}" \
              --arg path "${path}" \
              --arg version "${version}" \
              --arg major "${major}" \
              --arg minor "${minor}" \
              '. + [{app: $app, path: $path, version: $version, major: $major, minor: $minor}]')
          done < <(echo "${PATHS}" | jq -r '.[]')

          echo "matrix={\"include\":${MATRIX}}" >> "$GITHUB_OUTPUT"

          echo "### Released services" >> "$GITHUB_STEP_SUMMARY"
          echo "${MATRIX}" | jq -r '.[] | "- **\(.app)** → v\(.version)"' >> "$GITHUB_STEP_SUMMARY"

  # ── 2. Build & push Docker images for each released service ───────────────
  build-push:
    name: "Build ${{ matrix.app }}"
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.release-please.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.app }}
          tags: |
            type=raw,value=${{ matrix.version }}
            type=raw,value=${{ matrix.minor }}
            type=raw,value=${{ matrix.major }},enable=${{ matrix.major != '0' }}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ matrix.app }}
            org.opencontainers.image.version=${{ matrix.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
